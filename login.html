<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Đăng Nhập - Trung tâm Ngoại ngữ Pala</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'custom-pink': {
              50: '#fdf2f8', 100: '#fce7f3', 200: '#fbcfe8',
              300: '#f9a8d4', 400: '#f472b6', 500: '#ec4899',
              600: '#db2777', 700: '#be185d', 800: '#9d174d', 900: '#831843'
            }
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          animation: {
            'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-[100dvh] flex flex-col selection:bg-custom-pink-200 selection:text-custom-pink-900 relative">

  <header class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50 h-16 flex items-center justify-center shrink-0">
    <div class="container mx-auto px-4 flex justify-center items-center">
      <img src="images/PLC_Logo_FA_Horizontal_COLOUR.png" alt="Pala Language Centre Logo" class="h-10 md:h-12 w-auto object-contain transition-transform hover:scale-105" onerror="this.outerHTML='<span class=\'text-2xl font-black text-custom-pink-600 tracking-tight\'>PALA<span class=\'text-slate-800\'>CENTRE</span></span>'">
    </div>
  </header>

  <main class="flex-1 w-full flex items-center justify-center px-4">
    
    <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-6 sm:p-10 w-full max-w-md animate-fade-in-up hover:border-custom-pink-200 transition-colors duration-300">
      
      <div class="w-16 h-16 bg-custom-pink-50 text-custom-pink-500 rounded-2xl flex items-center justify-center mb-6 mx-auto">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
        </svg>
      </div>

      <div class="text-center mb-8">
        <h1 class="text-2xl sm:text-3xl font-black text-custom-pink-600 mb-2 tracking-tight">Hệ thống Kiểm tra năng lực đầu vào</h1>
        <p class="text-slate-500 font-medium text-sm sm:text-base">Vui lòng nhập tên đăng nhập và mật khẩu được cấp bởi giáo viên/nhân viên để đăng nhập</p>
      </div>

      <form id="login-form" action="/login" method="POST" class="space-y-5">
        <div>
          <label for="username" class="block text-sm font-bold text-slate-700 mb-2">Tên đăng nhập</label>
          <input type="text" id="username" name="username" required 
            class="w-full px-4 py-3 rounded-xl border-2 border-slate-100 bg-slate-50 focus:bg-white focus:border-custom-pink-400 focus:ring-4 focus:ring-custom-pink-100 transition-all outline-none text-slate-700" 
            placeholder="Nhập tài khoản...">
        </div>
        
        <div>
          <label for="password" class="block text-sm font-bold text-slate-700 mb-2">Mật khẩu</label>
          <input type="password" id="password" name="password" required 
            class="w-full px-4 py-3 rounded-xl border-2 border-slate-100 bg-slate-50 focus:bg-white focus:border-custom-pink-400 focus:ring-4 focus:ring-custom-pink-100 transition-all outline-none text-slate-700" 
            placeholder="••••••••">
        </div>

        <div id="error-message" class="hidden bg-red-50 text-red-600 text-sm font-medium py-3 px-4 rounded-xl text-center border border-red-100">
          Thông tin đăng nhập không chính xác.
        </div>

        <button type="submit" 
          class="w-full bg-custom-pink-600 hover:bg-custom-pink-700 text-white font-bold py-3.5 px-6 rounded-xl text-center transition-colors shadow-md mt-2 uppercase tracking-wide">
          Đăng Nhập
        </button>
      </form>

    </div>

  </main>

  <footer class="bg-white border-t border-slate-200 py-5 shrink-0">
    <div class="container mx-auto px-4 text-center">
      <p class="text-sm text-slate-400 font-semibold tracking-wide">© 2026 Trung tâm Ngoại ngữ Pala.</p>
    </div>
  </footer>

  <script>
    // Check if the URL has '?error=1'
    if (window.location.search.includes('error=1')) {
      // Remove the 'hidden' class from the error message
      document.getElementById('error-message').classList.remove('hidden');
    }
  </script>
</body>
</html>
